# This is CI/CD Pipeline.
# This will work on every push to the main branch.

name: Portfolio-CI/CD Pipeline

# Word        | Meaning                  |
# ----------- | ------------------------ |
# on:       | When to trigger pipeline |
# push:     | Trigger on code push     |
# branches: | Which branch triggers it (main/master) |

on:
  push:
    branches:
      - main

# Define pipeline jobs/stages
# runs-on:ubuntu-latest: run your code on virtual machine
# If you want to run on windows or macos, you can change it to windows-latest or macos-latest
# actions/checkout@v2: Download my repository code into the runner machine
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: install dependencies
        run: npm install

        run: npm test

      - name: run linting
        run: npm run lint

      - name: build project
        run: npm run build

